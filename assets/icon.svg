<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a8060"/>
      <stop offset="100%" stop-color="#2a5438"/>
    </linearGradient>
    <linearGradient id="nib" x1="220" y1="60" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1a3a24" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle paper texture lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="60" y1="140" x2="452" y2="140"/>
    <line x1="60" y1="200" x2="452" y2="200"/>
    <line x1="60" y1="260" x2="452" y2="260"/>
    <line x1="60" y1="320" x2="452" y2="320"/>
    <line x1="60" y1="380" x2="452" y2="380"/>
  </g>

  <!-- Flowing ink path (the "path" in Inkpath) -->
  <path d="M148 410 C180 370 220 380 240 350 C260 320 230 290 260 260 C290 230 320 250 330 220"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="14" stroke-linecap="round"/>
  <path d="M148 410 C180 370 220 380 240 350 C260 320 230 290 260 260 C290 230 320 250 330 220"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>

  <!-- Path start dot -->
  <circle cx="148" cy="410" r="12" fill="rgba(255,255,255,0.6)"/>

  <!-- Pen nib (connects to the end of the path) -->
  <g filter="url(#shadow)">
    <!-- Nib body -->
    <path d="M330 220 L356 112 L340 72 L324 72 L308 112 Z"
          fill="url(#nib)" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
    <!-- Nib slit -->
    <line x1="332" y1="118" x2="330" y2="200" stroke="#3a6b4c" stroke-width="3" stroke-linecap="round"/>
    <!-- Nib top band -->
    <rect x="310" y="108" width="44" height="10" rx="2" fill="rgba(255,255,255,0.7)"/>
  </g>

  <!-- Ink dot at nib tip -->
  <circle cx="330" cy="222" r="7" fill="white" opacity="0.9"/>

  <!-- Checkpoint dots along the path -->
  <circle cx="240" cy="350" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="258" cy="262" r="5" fill="rgba(255,255,255,0.4)"/>
</svg>
