<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' blob:; font-src 'self' data:; img-src 'self' data: blob:;">
    <title>Inkpath — Print Your Path to Productivity</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/rtl.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <link rel="stylesheet" href="css/templates.css">
</head>
<body>
    <!-- ========== NAVIGATION / CONTROLS (hidden when printing) ========== -->
    <header class="app-header no-print">
        <div class="header-inner">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32">
                    <defs>
                        <linearGradient id="logo-bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#4a8060"/>
                            <stop offset="100%" stop-color="#2a5438"/>
                        </linearGradient>
                    </defs>
                    <rect width="32" height="32" rx="7" fill="url(#logo-bg)"/>
                    <path d="M9 26 C11 23 14 24 15 22 C16 20 14.5 18.5 16 17 C17.5 15.5 19.5 16.5 20 15" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M20 15 L22 8 L21 5 L19.5 5 L18 8 Z" fill="white" stroke="rgba(255,255,255,0.8)" stroke-width="0.3"/>
                    <line x1="20" y1="8.5" x2="20" y2="13.5" stroke="#3a6b4c" stroke-width="0.8" stroke-linecap="round"/>
                    <circle cx="9" cy="26" r="1.2" fill="rgba(255,255,255,0.6)"/>
                    <circle cx="20" cy="15.2" r="1" fill="white" opacity="0.9"/>
                </svg>
                <h1>Inkpath</h1>
            </div>
            <p class="tagline" data-i18n="ui.tagline">Print your path to productivity. No screens needed.</p>
        </div>
    </header>

    <nav class="controls no-print">
        <div class="controls-inner">
            <!-- Language -->
            <div class="control-group">
                <label for="lang-select" data-i18n="ui.language">Language</label>
                <select id="lang-select">
                    <option value="en" selected>English</option>
                    <option value="ar">العربية</option>
                </select>
            </div>

            <!-- Template Selector -->
            <div class="control-group">
                <label for="template-select" data-i18n="ui.template">Template</label>
                <select id="template-select">
                    <optgroup label="Daily" data-i18n-label="opt.daily">
                        <option value="daily-planner" data-i18n="opt.dailyPlanner">Daily Planner</option>
                        <option value="daily-timeblock" data-i18n="opt.dailyTimeblock">Daily Time Blocker</option>
                        <option value="daily-focus" data-i18n="opt.dailyFocus">Deep Focus Day</option>
                    </optgroup>
                    <optgroup label="Weekly" data-i18n-label="opt.weekly">
                        <option value="weekly-planner" data-i18n="opt.weeklyPlanner">Weekly Planner</option>
                        <option value="weekly-habits" data-i18n="opt.weeklyHabits">Weekly Habit Tracker</option>
                        <option value="weekly-review" data-i18n="opt.weeklyReview">Weekly Review</option>
                    </optgroup>
                    <optgroup label="Monthly" data-i18n-label="opt.monthly">
                        <option value="monthly-planner" data-i18n="opt.monthlyPlanner">Monthly Planner</option>
                        <option value="monthly-goals" data-i18n="opt.monthlyGoals">Monthly Goal Setter</option>
                        <option value="monthly-habits" data-i18n="opt.monthlyHabits">Monthly Habit Grid</option>
                    </optgroup>
                    <optgroup label="Anti-Procrastination" data-i18n-label="opt.antiProcrastination">
                        <option value="procrastination-buster" data-i18n="opt.procrastinationBuster">Procrastination Buster</option>
                        <option value="accountability-sheet" data-i18n="opt.accountabilitySheet">Accountability Sheet</option>
                    </optgroup>
                    <optgroup label="Yearly & Vision" data-i18n-label="opt.yearlyVision">
                        <option value="yearly-vision" data-i18n="opt.yearlyVisionBoard">Annual Vision Board</option>
                        <option value="quarterly-planner" data-i18n="opt.quarterlyPlanner">Quarterly Planner</option>
                    </optgroup>
                    <optgroup label="Finance" data-i18n-label="opt.finance">
                        <option value="monthly-budget" data-i18n="opt.monthlyBudget">Monthly Budget</option>
                        <option value="expense-log" data-i18n="opt.expenseLog">Expense Log</option>
                        <option value="savings-goals" data-i18n="opt.savingsGoals">Savings Goals Tracker</option>
                    </optgroup>
                    <optgroup label="Health & Fitness" data-i18n-label="opt.health">
                        <option value="workout-log" data-i18n="opt.workoutLog">Workout Log</option>
                        <option value="meal-planner" data-i18n="opt.mealPlanner">Meal Planner</option>
                        <option value="sleep-tracker" data-i18n="opt.sleepTracker">Sleep Tracker</option>
                    </optgroup>
                    <optgroup label="Productivity" data-i18n-label="opt.productivity">
                        <option value="brain-dump" data-i18n="opt.brainDump">Brain Dump</option>
                        <option value="project-planner" data-i18n="opt.projectPlanner">Project Planner</option>
                        <option value="routines" data-i18n="opt.routines">Morning & Evening Routines</option>
                    </optgroup>
                    <optgroup label="Study & Learning" data-i18n-label="opt.study">
                        <option value="study-session" data-i18n="opt.studySession">Study Session Planner</option>
                        <option value="exam-countdown" data-i18n="opt.examCountdown">Exam Countdown Planner</option>
                        <option value="cornell-notes" data-i18n="opt.cornellNotes">Cornell Notes</option>
                        <option value="spaced-repetition" data-i18n="opt.spacedRepetition">Spaced Repetition Tracker</option>
                        <option value="study-timetable" data-i18n="opt.studyTimetable">Weekly Study Timetable</option>
                        <option value="assignment-tracker" data-i18n="opt.assignmentTracker">Assignment Tracker</option>
                        <option value="subject-review" data-i18n="opt.subjectReview">Subject Review Sheet</option>
                    </optgroup>
                    <optgroup label="Personal Growth" data-i18n-label="opt.personal">
                        <option value="journal" data-i18n="opt.journal">Gratitude & Mood Journal</option>
                        <option value="reading-log" data-i18n="opt.readingLog">Reading & Learning Log</option>
                        <option value="relationships" data-i18n="opt.relationships">Relationships & Social</option>
                        <option value="decision-maker" data-i18n="opt.decisionMaker">Decision Maker</option>
                        <option value="emergency-ref" data-i18n="opt.emergencyRef">Emergency Reference</option>
                    </optgroup>
                </select>
            </div>

            <!-- Paper Size -->
            <div class="control-group">
                <label for="paper-size" data-i18n="ui.paperSize">Paper Size</label>
                <select id="paper-size">
                    <option value="a4" selected>A4 (210 × 297 mm)</option>
                    <option value="a5">A5 (148 × 210 mm)</option>
                </select>
            </div>

            <!-- Date Picker -->
            <div class="control-group">
                <label for="start-date" data-i18n="ui.startDate">Start Date</label>
                <input type="date" id="start-date">
            </div>

            <!-- Theme -->
            <div class="control-group">
                <label for="theme-select" data-i18n="ui.style">Style</label>
                <select id="theme-select">
                    <option value="minimal" selected data-i18n="ui.minimal">Minimal</option>
                    <option value="lined" data-i18n="ui.lined">Lined</option>
                    <option value="dotgrid" data-i18n="ui.dotGrid">Dot Grid</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="control-group actions">
                <button id="btn-generate" class="btn btn-primary" data-i18n="ui.generate">Generate</button>
                <button id="btn-print" class="btn btn-secondary" data-i18n="ui.print">🖨️ Print</button>
                <button id="btn-pdf" class="btn btn-accent" disabled data-i18n="ui.exportPdf">📄 Export PDF</button>
                <button id="btn-word" class="btn btn-accent" disabled data-i18n="ui.exportWord">📝 Export Word</button>
            </div>
        </div>
    </nav>

    <!-- ========== TEMPLATE PREVIEW / PRINT AREA ========== -->
    <main id="print-area" class="print-area">
        <!-- Templates are injected here by JS -->
        <div id="template-container" class="template-container">
            <div class="empty-state no-print">
                <svg viewBox="0 0 64 64" width="64" height="64">
                    <rect x="8" y="4" width="48" height="56" rx="4" fill="none" stroke="#ccc" stroke-width="2"/>
                    <line x1="18" y1="16" x2="46" y2="16" stroke="#ddd" stroke-width="2"/>
                    <line x1="18" y1="24" x2="46" y2="24" stroke="#ddd" stroke-width="2"/>
                    <line x1="18" y1="32" x2="38" y2="32" stroke="#ddd" stroke-width="2"/>
                    <circle cx="32" cy="48" r="8" fill="none" stroke="#ddd" stroke-width="2"/>
                    <line x1="32" y1="44" x2="32" y2="52" stroke="#ddd" stroke-width="2"/>
                    <line x1="28" y1="48" x2="36" y2="48" stroke="#ddd" stroke-width="2"/>
                </svg>
                <h2 data-i18n="ui.emptyTitle">Choose a template and hit Generate</h2>
                <p data-i18n="ui.emptySubtitle">Your printable planner page will appear here</p>
            </div>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="app-footer no-print">
        <p><span class="brand-name">Inkpath</span> &mdash; Take control of your time, on paper. v<span id="app-version">1.0.0</span> &copy; <span id="app-year">2026</span></p>
    </footer>

    <!-- Scripts -->
    <script src="js/lib/html2pdf.bundle.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/version.js"></script>
    <script src="js/templates/daily.js"></script>
    <script src="js/templates/weekly.js"></script>
    <script src="js/templates/monthly.js"></script>
    <script src="js/templates/anti-procrastination.js"></script>
    <script src="js/templates/yearly.js"></script>
    <script src="js/templates/finance.js"></script>
    <script src="js/templates/health.js"></script>
    <script src="js/templates/productivity.js"></script>
    <script src="js/templates/personal.js"></script>
    <script src="js/templates/study.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
